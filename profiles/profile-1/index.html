<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body {
      text-align: center;
      font-size: 40px;
      font-family: 'Times New Roman', Times, serif;
      background: radial-gradient(circle at top, #5b3a8a 0%, #280a3d 65%);
      color: #f3e8ff;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    select {
      padding: 10px;
      margin: 30px;
      font-size: 25px;
      font-family: 'Times New Roman', Times, serif;
      border-radius: 50px;
      border: 2px solid #524174;
      background: rgba(255, 255, 255, 0.18);
      color: #230d4b;
      outline: none;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .container {
      display: flex;
      background: rgba(255, 255, 255, 0.14);
      padding: 25px;
      border-radius: 30px;
      border: 2px solid rgba(196, 167, 255, 0.45);
      box-shadow: 0 0 30px rgba(110, 57, 157, 0.18);
      gap: 40px;
      width: 80%;
      min-height: 250px;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    .info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }
    .info h2 {
      margin: 10px 0 5px;
      color: #f8f1ff;
    }
    .info p,
    .info li {
      margin: 0 0 15px;
      font-size: 20px;
      color: #e7daff;
    }
    .section {
      display: none;
      width: 100%;
      justify-content: center;
    }
    .back-btn {
      margin-bottom: 24px;
      background: #5c4899;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover {
      background: #6f45e6;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <button class="back-btn" type="button" onclick="location.href='../../index.html'">Back to Home</button>
  <div class="wrapper">
    <select name="about_me" id="about_me" onchange="showSection(this.value)">
      <option value="hobbies">Hobbies</option>
      <option value="retroperspective">Retroperspective</option>
    </select>

    <div id="hobbies" class="section">
      <div class="container">
        <div class="info">
          <h2 style="text-align: center;">Hobbies</h2>
          <ul>
            <li>I love reading novels</li>
            <li>I enjoy window shopping</li>
            <li>I'm passionate about learning to cook new cuisines.</li>
            <li>I like biking</li>
          </ul>
        </div>
      </div>
    </div>

    <div id="retroperspective" class="section">
      <div class="container">
        <div class="info">
          <h2 style="text-align: center;">Retroperspective</h2>
          <ul>
            <li>Start working on tasks as soon as they are assigned.</li>
            <li>Manage your time wisely.</li>
            <li>ncdn</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showSection(value) {
      document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
      document.getElementById(value).style.display = 'flex';
    }
    showSection('hobbies');
  </script>
</body>
</html>
