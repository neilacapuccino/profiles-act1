<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap');


    .back-btn {
      margin: 1rem;
      padding: 0.5rem 1rem;
      font-size: 1.5rem;
      background-color: #f1eaeac7;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      border-radius: 30px;
      color: #ffb347;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      background: rgba(0, 0, 0, 0.62);
      }

    button:hover {
      background-color: #8faff5;
      cursor: pointer;
      }

    .page-profile {
      display: flex; 
      margin: 0 auto;
      flex-direction: column;
      background-image: url(../../assets/elements/1f9b037cb7caa4d.gif);
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
     }

    body {
      text-align: center;
      font-size: 40px;
      font-family: 'Times New Roman', Times, serif;
      background: radial-gradient(circle at top, #d4a41d 0%, #faa300 65%);
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      font-family: 'Saira', sans-serif;
      background-image: url(../../assets/elements/1f9b037cb7caa4d.gif);
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
     }

    h1 {
      font-size: 90px;
      margin-bottom: 1rem;
      font-family: 'Saira', sans-serif;
      color: #f5c56b;
      border-bottom: 2px solid #302b2b00;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      }

    h3 {
      color: #f0d8a1;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
      }

    .link-grid {
      display: flex;
      gap: 0.75rem;
      justify-items: center;
      margin-top: 1rem;
      border-radius: 30px;
      padding: 25px;
      
    }

    .link-grid.collapsed {
      display: none;
    }

    .toggle-btn {
      margin: 1rem auto 0;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      background-color: #f1eaeac7;
      color: #111;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #524174;
      border-radius: 50px;
      color: #2e2296;
      font-family: 'Saira', sans-serif;
      font-size: 1.25rem;
    }

    .toggle-btn:hover {
      background-color: #8faff5;
    }

    div {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    a {
      text-decoration: none;
      color: #1114ca;
      font-size: 80px;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
    }

    .profile-link {
      width: 90%;
      margin: 2rem auto 1.2rem;
      padding: 0.8rem 0.9rem;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      color: #ffb347;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }

    .profile-link:hover {
      background-color: #8faff5;
      color: #fff;
      border-radius: 50px;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      background-size: cover;
      background-position: center;
      padding: 2rem;
    }

    .page-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;

    }


  </style>
  <script src="script.js"></script>
</head>
<body>
  <button class="back-btn" type="button" onclick="location.href='../../index.html'">Back to Home</button>
      <main class="profile-links">
        <h1>Nherf Rossel Gempasao</h1>
        <h3>Date of Birth: October 3, 2005</h3>
        <h3>Age: 20</h3>
        <h3>Address: Poblacion West, Oton, Iloilo</h3>
        <h3>Course: Bachelor of Science in Software Engineering</h3>
        <div class="link-grid" id="linkGrid">
          <a class="profile-link" href="hobbies.html">Hobbies</a>
          <a class="profile-link" href="retro.html">Retrospectives</a>
        </div>
      </main>
</body>
</html>
