<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap');


    .back-btn {
      margin: 1rem;
      padding: 0.5rem 1rem;
      font-size: 1.25rem;
      background-color: #f1eaeac7;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      }
    button:hover {
      background-color: #8faff5;
      cursor: pointer;
    }

    .page-profile {
      display: flex; 
     }

    body {
      text-align: center;
      font-size: 40px;
      font-family: 'Times New Roman', Times, serif;
      background: radial-gradient(circle at top, #104eac 0%, #280a3d 65%);
      color: #1114ca;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      font-family: 'Saira', sans-serif;
     }

    .h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-family: 'Saira', sans-serif;
      }

    .link-grid {
      display: grid;
      gap: 0.75rem;
      justify-items: center;
      margin-top: 1rem;
      box-shadow: 0 0 30px rgba(110, 57, 157, 0.18);
      border-radius: 30px;
      padding: 25px;
      
    }

    .link-grid.collapsed {
      display: none;
    }

    .toggle-btn {
      margin: 1rem auto 0;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      background-color: #f1eaeac7;
      color: #111;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid #524174;
      border-radius: 50px;
      color: #2e2296;
      font-family: 'Saira', sans-serif;
      font-size: 1.25rem;
    }

    .toggle-btn:hover {
      background-color: #8faff5;
    }

    div {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    canvas {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.14);
    }

    a {
      text-decoration: none;
      color: #1114ca;
      font-size: 80px;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
    }

    .profile-link {
      display: flex;
      padding: 1rem 2rem;
      background-color: #f1eaeac7;

      font-size: 1.25rem;
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .profile-link:hover {
      background-color: #8faff5;
      color: #fff;
    }
  </style>
  <script>
    function toggleLinks() {
      const grid = document.getElementById('linkGrid');
      const button = document.querySelector('.toggle-btn');
      const isCollapsed = grid.classList.toggle('collapsed');
      button.textContent = isCollapsed ? 'Show options' : 'Hide options';
    }
  </script>
</head>
<body>
  <button class="back-btn" type="button" onclick="location.href='../../index.html'">Back to Home</button>
  <div class="page-profile">
    <a class="close-btn" href="../../index.html" aria-label="Close">✕</a>
    <div class="canvas">
      <main class="profile-links">
        <h1>Nherf Rossel Gempasao</h1>
        <p>Choose a profile page below:</p>
        <button class="toggle-btn" type="button" onclick="toggleLinks()">Hide options</button>
        <div class="link-grid" id="linkGrid">
          <a class="profile-link" href="hobbies.html">Hobbies</a>
          <a class="profile-link" href="retro.html">Retrospectives</a>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
